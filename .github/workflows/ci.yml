name: CI
on:
  push:
    branches: [dev]
  pull_request:
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 需要 tag,供 git describe
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: 前端构建并同步(internal/webui/dist 供 go embed)
        run: |
          (cd web && (npm ci || npm install))
          npm --prefix web run build
          go run ./tools/sync-web-dist
      - run: go vet ./...
      - run: go test ./...
      - name: go build
        run: |
          VERSION="$(git describe --tags --always --dirty 2>/dev/null | sed 's/^v//')"
          VERSION="${VERSION:-dev}"
          CGO_ENABLED=0 go build -trimpath \
            -ldflags "-s -w -X github.com/fengheasia/frp-warden/internal/version.Version=${VERSION}" \
            -o dist/frp-warden ./cmd/frp-warden
